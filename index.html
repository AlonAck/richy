<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Claude Budget</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#1C1C1E;}
#mount{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
#app{background:#F2F2F7;width:390px;height:844px;display:flex;flex-direction:column;overflow:hidden;position:relative;border-radius:52px;box-shadow:0 0 0 0.5px rgba(255,255,255,0.12),0 40px 100px rgba(0,0,0,0.7),0 10px 30px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.35);}

/* Status bar */
.status-bar{height:54px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;padding:14px 28px 0;position:relative;background:#F2F2F7;}
.status-time{font-size:15px;font-weight:600;color:#000;letter-spacing:-0.3px;}
.status-right{display:flex;align-items:center;gap:5px;}
.status-island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#000;border-radius:20px;}

/* Brand bar (row 1 of header) */
.brand-bar{background:#F2F2F7;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px 8px;}
.brand-time{font-size:15px;font-weight:600;color:#000;letter-spacing:-0.2px;}
.brand-title{font-size:11px;font-weight:700;color:#C8673A;letter-spacing:0.14em;text-transform:uppercase;}
.profile-btn{background:rgba(120,120,128,0.12);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* Nav bar (row 2 of header) */
.topbar{background:#F2F2F7;flex-shrink:0;display:flex;align-items:center;gap:8px;padding:0 16px 10px;}
.nav-pill{background:#fff;border-radius:22px;padding:7px 14px;font-size:14px;font-weight:600;color:#000;flex-shrink:0;white-space:nowrap;}
.nav-center-title{flex:1;text-align:center;font-size:17px;font-weight:700;color:#000;letter-spacing:-0.3px;}

/* Content */
.content{flex:1;overflow-y:auto;scrollbar-width:none;padding-top:4px;}
.content::-webkit-scrollbar{display:none;}

/* Tab bar */
.navbar{background:#fff;border-top:0.5px solid rgba(60,60,67,0.12);flex-shrink:0;display:flex;justify-content:space-around;align-items:center;padding:8px 0 22px;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:2px 10px;}
.nav-icon-wrap{width:46px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:background 0.15s;}
.nav-icon-wrap.active{background:#1C1C1E;}
.nav-label{font-size:10px;font-weight:500;color:rgba(60,60,67,0.4);}
.nav-label.active{color:#C8673A;font-weight:600;}

/* Floating Action Button */
.fab-float{position:absolute;bottom:82px;right:18px;width:50px;height:50px;background:#C8673A;border-radius:50%;border:none;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;box-shadow:0 4px 20px rgba(200,103,58,0.5);line-height:1;}

/* Cards */
.card{background:#fff;border-radius:16px;margin:0 16px 10px;overflow:hidden;}
.card-inner{padding:16px;}

/* Section titles — bold large style */
.sec-bold{font-size:22px;font-weight:700;color:#000;padding:14px 16px 8px;letter-spacing:-0.3px;}

/* Inset group lists */
.group{background:#fff;border-radius:16px;margin:0 16px 10px;overflow:hidden;}
.group-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:0.5px solid rgba(60,60,67,0.08);}
.group-row:last-child{border-bottom:none;}

/* Transaction rows */
.tx-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.tx-chevron{color:rgba(60,60,67,0.22);font-size:18px;flex-shrink:0;font-weight:500;}

/* Amount badges */
.amt-badge{font-size:15px;font-weight:600;border-radius:8px;padding:3px 9px;white-space:nowrap;}
.amt-expense{color:#FF3B30;background:rgba(255,59,48,0.09);}
.amt-income{color:#34C759;background:rgba(52,199,89,0.10);}

/* Category suggestion chips */
.sug-chip{display:flex;align-items:center;gap:9px;background:#fff;border-radius:14px;padding:10px 14px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.sug-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}

/* Progress bar */
.pbar-bg{background:rgba(120,120,128,0.15);border-radius:99px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;transition:width 0.4s cubic-bezier(.4,0,.2,1);}
.storage-bar{display:flex;height:7px;border-radius:99px;overflow:hidden;gap:1px;background:rgba(120,120,128,0.12);}
.storage-seg{height:100%;}

/* Overlay / bottom sheet */
.overlay{position:absolute;bottom:0;left:0;right:0;z-index:200;background:#F2F2F7;border-radius:14px 14px 0 0;box-shadow:0 -0.5px 0 rgba(60,60,67,0.2),0 -8px 40px rgba(0,0,0,0.18);padding-bottom:30px;}
.overlay-handle{width:36px;height:5px;border-radius:3px;background:rgba(60,60,67,0.2);margin:8px auto 0;}
.overlay-header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 10px;}
.overlay-title{font-size:17px;font-weight:700;color:#000;}
.close-btn{background:rgba(120,120,128,0.16);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;color:rgba(60,60,67,0.6);font-size:17px;display:flex;align-items:center;justify-content:center;font-weight:600;}
.form-group{background:#fff;border-radius:13px;margin:0 16px 10px;overflow:hidden;}
.form-row{padding:12px 16px;border-bottom:0.5px solid rgba(60,60,67,0.1);}
.form-row:last-child{border-bottom:none;}
.form-lbl{font-size:12px;font-weight:600;color:rgba(60,60,67,0.5);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px;}
.form-row input,.form-row select{width:100%;border:none;background:none;font-size:17px;color:#000;outline:none;padding:0;font-family:inherit;}
.big-btn{display:block;width:calc(100% - 32px);margin:10px 16px 0;background:#C8673A;color:#fff;border:none;border-radius:13px;padding:15px 0;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;}

/* Ring */
.ring-wrap{position:relative;flex-shrink:0;}
.ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}

/* Chat */
.chat-msg{max-width:80%;border-radius:18px;padding:9px 13px;font-size:15px;line-height:1.45;white-space:pre-wrap;}
.chip{background:rgba(60,60,67,0.06);border:0.5px solid rgba(60,60,67,0.12);border-radius:18px;padding:8px 16px;font-size:14px;color:#000;cursor:pointer;margin:3px;display:inline-block;}

/* Auth */
.auth-wrap{height:100%;background:linear-gradient(170deg,#FDF7EF 0%,#F5EBE0 50%,#EDE3D5 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px;}
.auth-pill-input{background:rgba(255,255,255,0.85);border-radius:14px;padding:15px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.auth-pill-input input{flex:1;border:none;background:none;font-size:17px;color:#000;outline:none;font-family:inherit;}
.auth-pill-input input::placeholder{color:rgba(60,60,67,0.35);}
.auth-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:rgba(60,60,67,0.4);font-size:13px;}
.auth-divider::before,.auth-divider::after{content:"";flex:1;height:0.5px;background:rgba(60,60,67,0.2);}
.auth-social-row{display:flex;gap:10px;width:100%;}
.auth-social-btn{flex:1;background:#fff;border:0.5px solid rgba(60,60,67,0.15);border-radius:13px;padding:12px 0;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;}

/* Categories */
.cat-folder-hdr{padding:6px 16px;display:flex;align-items:center;gap:8px;}
.cat-folder-name{font-size:12px;font-weight:700;color:rgba(60,60,67,0.5);text-transform:uppercase;letter-spacing:0.05em;flex:1;}
</style>
</head>

<script>
var DB={index:{},users:{},session:null};

function doAuth(){
  var u=state.authUser.trim().toLowerCase();
  if(u.length<3){state.authErr="Username must be at least 3 characters.";render();return;}
  if(state.authPass.length<6){state.authErr="Password must be at least 6 characters.";render();return;}
  if(state.authMode==="register"){
