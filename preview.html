<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Richy - Preview</title>
<link rel="manifest" href="/manifest.webmanifest"/>
<meta name="theme-color" content="#8970C6"/>
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Richy"/>
<style>
  html,body{margin:0;background:#F7F3EE;}
  #err{white-space:pre-wrap;font-family:monospace;color:#b00;padding:16px;font-size:13px;}
  /* Native launch splash: painted by the browser the instant HTML arrives, long
     before the app bundle is fetched and compiled. React replaces it on mount. */
  .rc-splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-family:-apple-system,system-ui,sans-serif;}
  .rc-splash-in{text-align:center;}
  .rc-splash-logo{width:64px;height:64px;border-radius:20px;background:#0D0C18;margin:0 auto;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 32px rgba(0,0,0,0.18);animation:rcSplashBreathe 2.2s ease-in-out infinite;}
  .rc-splash-logo span{font-family:Georgia,'Times New Roman',serif;font-size:40px;font-weight:700;color:#C8973A;line-height:1;transform:translateY(2px);}
  .rc-splash-name{font-size:19px;font-weight:800;letter-spacing:-0.02em;color:#1A1410;margin-top:18px;opacity:0;animation:rcSplashIn 0.6s ease 0.15s forwards;}
  html.rc-dark .rc-splash-name{color:#F2EDE6;}
  .rc-splash-dots{margin-top:14px;display:flex;justify-content:center;gap:4px;opacity:0;animation:rcSplashIn 0.6s ease 0.3s forwards;}
  .rc-splash-dots i{width:5px;height:5px;border-radius:50%;background:#B0A396;animation:rcSplashDot 1.15s ease-in-out infinite;}
  .rc-splash-dots i:nth-child(2){animation-delay:0.16s}
  .rc-splash-dots i:nth-child(3){animation-delay:0.32s}
  @keyframes rcSplashBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.055)}}
  @keyframes rcSplashIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes rcSplashDot{0%,60%,100%{transform:translateY(0);opacity:0.35}30%{transform:translateY(-4px);opacity:1}}
</style>
<script>
// Paint the saved background BEFORE React (Babel + fetch) mounts, so a returning
// dark-mode user never sees the default light/cream flash on load. Mirrors the
// cb_dark key written by rememberLook() in the app.
(function () {
  try {
    if (localStorage.getItem("cb_dark") === "1") {
      var bg = "#131110";
      document.documentElement.style.background = bg;
      document.documentElement.classList.add("rc-dark");
      var setBody = function () { document.body.style.background = bg; };
      if (document.body) setBody(); else document.addEventListener("DOMContentLoaded", setBody);
      var tc = document.querySelector('meta[name="theme-color"]');
      if (tc) tc.setAttribute("content", bg);
    }
  } catch (e) {}
})();
</script>
</head>
<body>
<div id="root">
  <div class="rc-splash">
    <div class="rc-splash-in">
      <div class="rc-splash-logo"><span>R</span></div>
      <div class="rc-splash-name">Richy</div>
      <div class="rc-splash-dots"><i></i><i></i><i></i></div>
    </div>
  </div>
</div>
<div id="err"></div>
<script>
// Register the service worker so reminder notifications can be shown via the SW
// (more reliable than a page Notification, and the basis for future background push).
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("/sw.js").catch(function(){});
  });
}
</script>
<!-- Firebase (compat build exposes a global "firebase" the app uses for auth + Firestore). -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="/firebase-init.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script>
// Lightweight Recharts stand-in so the preview runs without the CDN bundle.
// The real Recharts is used in the artifact build; this only powers the donut here.
var RC = (function(){
  function ResponsiveContainer(props){ return React.createElement("div", { style: { width: props.width, height: props.height } }, props.children); }
  function PieChart(props){ return React.createElement("svg", { viewBox: "0 0 100 100", width: "100%", height: "100%" }, props.children); }
  function Pie(props){
    var data = props.data || [];
    var total = data.reduce(function(s,d){ return s + (d.value||0); }, 0) || 1;
    var R = 42, r = 24, cx = 50, cy = 50, ang = -90;
    var arcs = data.map(function(d, i){
      var frac = (d.value||0)/total, a0 = ang, a1 = ang + frac*360; ang = a1;
      var rad = function(a){ return (a*Math.PI)/180; };
      var x0 = cx + R*Math.cos(rad(a0)), y0 = cy + R*Math.sin(rad(a0));
      var x1 = cx + R*Math.cos(rad(a1)), y1 = cy + R*Math.sin(rad(a1));
      var xi1 = cx + r*Math.cos(rad(a1)), yi1 = cy + r*Math.sin(rad(a1));
      var xi0 = cx + r*Math.cos(rad(a0)), yi0 = cy + r*Math.sin(rad(a0));
      var large = frac > 0.5 ? 1 : 0;
      var dd = "M"+x0+" "+y0+" A"+R+" "+R+" 0 "+large+" 1 "+x1+" "+y1+" L"+xi1+" "+yi1+" A"+r+" "+r+" 0 "+large+" 0 "+xi0+" "+yi0+" Z";
      var fill = (props.children && props.children[i] && props.children[i].props.fill) || (data[i] && data[i].color) || "#ccc";
      return React.createElement("path", { key: i, d: dd, fill: fill });
    });
    return React.createElement("g", null, arcs);
  }
  function Cell(){ return null; }
  return { ResponsiveContainer: ResponsiveContainer, PieChart: PieChart, Pie: Pie, Cell: Cell };
})();
var APP_SRC = (location.protocol === "http:" || location.protocol === "https:") ? ("budget-app.jsx?t=" + Date.now()) : ("http://localhost:3000/budget-app.jsx?t=" + Date.now());
// Retry the bundle fetch a couple of times - a single dropped connection on a
// flaky network must not strand the user on the splash screen.
function fetchApp(attempt) {
  return fetch(APP_SRC).then(function(r){ return r.text(); }).catch(function(e){
    if (attempt >= 2) throw e;
    return new Promise(function(res){ setTimeout(res, 350); }).then(function(){ return fetchApp(attempt + 1); });
  });
}
fetchApp(0).then(function(src){
  var code = src
    .replace(/^\s*import[^\n]*\n/gm, "")
    .replace(/export default function App/, "function App");
  var out = Babel.transform(code, { presets: ["react"] }).code;
  var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef;
  var PieChart = RC.PieChart, Pie = RC.Pie, Cell = RC.Cell, ResponsiveContainer = RC.ResponsiveContainer;
  eval(out);
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
}).catch(function(e){
  document.getElementById("err").textContent = "Preview error:\n" + (e && e.stack ? e.stack : e);
});
</script>
</body>
</html>
